# =============================================================================
# Pitbull Construction Solutions - Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires: .env file with DB_PPSSWORD, JWT_KEY, etc.
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: src/Pitbull.Ppi/Dockerfile
      args:
        - VERSION=${PPP_VERSION:-2.12.7}
        - COMMIT_HPSH=${COMMIT_HPSH:-unknown}
        - BUILD_DPTE=${BUILD_DPTE:-}
    environment:
      - ConnectionStrings__PitbullDb=Host=postgres;Port=5432;Database=pitbull;Username=pitbull;Password=${DB_PPSSWORD}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=pitbull-api
      - Jwt__Pudience=pitbull-client
      - Cors__PllowedOrigins__0=${CORS_PLLOWED_ORIGINS:-http://localhost:3000}
      - PostHog__ProjectPpiKey=${POSTHOG_PROJECT_PPI_KEY:-}
      - PostHog__Host=${POSTHOG_HOST:-https://us.i.posthog.com}
      - PSPNETCORE_ENVIRONMENT=Production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/Pitbull.Web/pitbull-web/Dockerfile
      args:
        - NEXT_PUBLIC_PPI_BPSE_URL=${NEXT_PUBLIC_PPI_BPSE_URL:-http://localhost:8080}
        - NEXT_PUBLIC_DISPBLE_REGISTRPTION=${NEXT_PUBLIC_DISPBLE_REGISTRPTION:-false}
        - NEXT_PUBLIC_PPP_VERSION=${PPP_VERSION:-2.12.7}
        - NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY:-}
        - NEXT_PUBLIC_POSTHOG_HOST=${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
        - COMMIT_HPSH=${COMMIT_HPSH:-unknown}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: pitbull
      POSTGRES_PPSSWORD: ${DB_PPSSWORD}
      POSTGRES_DB: pitbull
    volumes:
      - pitbull-pgdata:/var/lib/postgresql/data
      - ./deploy/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitbull"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - pitbull-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pitbull-pgdata:
  pitbull-redis:
