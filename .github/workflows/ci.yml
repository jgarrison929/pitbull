name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'
  # Lucky Penny community license — suppresses MediatR license warnings in CI tests.
  # Repo secret: Settings → Secrets → MEDIATR_LICENSE_KEY (JWT from luckypennysoftware.com/community)
  MEDIATR_LICENSE_KEY: ${{ secrets.MEDIATR_LICENSE_KEY }}

jobs:
  build-backend:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pitbull
          POSTGRES_PASSWORD: pitbull_dev
          POSTGRES_DB: pitbull_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
        with:
          clean: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Scan for vulnerable packages
        run: |
          echo "::group::NuGet Vulnerability Scan"
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerability-scan.txt
          if grep -q "has the following vulnerable packages" vulnerability-scan.txt; then
            echo "::error::Vulnerable NuGet packages detected!"
            echo "::group::Vulnerable packages found"
            grep -A 20 "has the following vulnerable packages" vulnerability-scan.txt
            echo "::endgroup::"
            exit 1
          else
            echo "✅ No vulnerable packages detected"
          fi
          echo "::endgroup::"

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Check migrations for dangerous patterns
        run: |
          echo "::group::Migration Safety Check"
          DANGEROUS_PATTERNS=0
          
          # Check for RenameColumn or RenameTable (dangerous in production - can break queries)
          if grep -rE "(RenameColumn|RenameTable)" src/Pitbull.Api/Migrations/*.cs 2>/dev/null; then
            echo "::error::RenameColumn/RenameTable detected - this can break production queries!"
            DANGEROUS_PATTERNS=1
          fi
          
          # Check for Sql() with DROP TABLE/TRUNCATE (destructive to data)
          # Excludes safe operations: DROP POLICY, DROP INDEX, DROP CONSTRAINT (RLS/schema management)
          if grep -rE 'Sql\s*\(\s*"[^"]*\b(DROP|TRUNCATE)\b' src/Pitbull.Api/Migrations/*.cs 2>/dev/null \
             | grep -vE 'DROP (POLICY|INDEX|CONSTRAINT)' ; then
            echo "::error::Manual DROP/TRUNCATE SQL detected - review carefully!"
            DANGEROUS_PATTERNS=1
          fi
          
          if [ $DANGEROUS_PATTERNS -eq 1 ]; then
            echo "::error::Dangerous migration patterns detected. Review carefully before merging."
            exit 1
          else
            echo "✅ No dangerous migration patterns detected"
          fi
          echo "::endgroup::"

      - name: Run Unit Tests
        run: dotnet test tests/Pitbull.Tests.Unit --no-build --configuration Release --verbosity normal

      - name: Run Integration Tests
        run: dotnet test tests/Pitbull.Tests.Integration --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__PitbullDb: "Host=localhost;Port=5432;Database=pitbull_test;Username=pitbull;Password=pitbull_dev"

  build-frontend:
    name: Build Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/Pitbull.Web/pitbull-web/package-lock.json

      - name: Install dependencies
        working-directory: src/Pitbull.Web/pitbull-web
        run: npm ci

      - name: Audit npm packages for vulnerabilities
        working-directory: src/Pitbull.Web/pitbull-web
        run: |
          echo "::group::npm Vulnerability Audit"
          # Only audit production dependencies (omit dev-only tooling like eslint)
          # Dev dependency vulnerabilities (e.g. eslint/minimatch ReDoS) don't affect the built app
          if npm audit --audit-level high --omit=dev; then
            echo "✅ No high+ production vulnerabilities detected"
          else
            echo "::error::npm audit found high+ vulnerabilities in production dependencies!"
            echo "Run 'npm audit fix' to address auto-fixable issues"
            exit 1
          fi
          echo "::endgroup::"

      - name: Build
        working-directory: src/Pitbull.Web/pitbull-web
        run: npm run build

      - name: Lint
        working-directory: src/Pitbull.Web/pitbull-web
        run: npm run lint

  role-e2e-smoke:
    name: Role E2E Smoke (Playwright L4)
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pitbull
          POSTGRES_PASSWORD: pitbull_dev
          POSTGRES_DB: pitbull_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__PitbullDb: "Host=localhost;Port=5432;Database=pitbull_test;Username=pitbull;Password=pitbull_dev"
      Demo__Enabled: "true"
      Demo__SeedOnStartup: "true"
      API_BASE_URL: http://localhost:5081
      DEMO_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5081
      SCRATCH_DIR: /tmp/pitbull-role-e2e-ci

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            e2e/package-lock.json
            src/Pitbull.Web/pitbull-web/package-lock.json

      - name: Build API
        run: dotnet build --configuration Release src/Pitbull.Api/Pitbull.Api.csproj

      - name: Install frontend dependencies
        working-directory: src/Pitbull.Web/pitbull-web
        run: npm ci

      - name: Build frontend
        working-directory: src/Pitbull.Web/pitbull-web
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5081
        run: npm run build

      - name: Start API (Development + demo seed)
        run: |
          dotnet run --project src/Pitbull.Api/Pitbull.Api.csproj \
            --configuration Release --no-build \
            --urls http://localhost:5081 &
          echo $! > api.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5081/health/live; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "::error::API failed to start"
          exit 1

      - name: Start frontend
        working-directory: src/Pitbull.Web/pitbull-web
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5081
        run: |
          npm run start -- -p 3000 &
          echo $! > ../../frontend.pid
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Frontend failed to start"
          exit 1

      - name: Run role E2E smoke (L4 owner billing)
        run: |
          chmod +x scripts/run-role-e2e.sh
          # Full suite is heavy; CI runs L4 smoke via scripts/run-role-e2e.sh --smoke
          ./scripts/run-role-e2e.sh --smoke --api-url "$API_BASE_URL" --web-url "$DEMO_BASE_URL" --scratch-dir "$SCRATCH_DIR"

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: role-e2e-smoke-artifacts
          path: |
            e2e/recordings/**
            /tmp/pitbull-role-e2e-ci/**
          if-no-files-found: ignore

  # 2.21.5 — mobile field report smoke (continue-on-error until required at 2.22.2)
  mobile-smoke:
    name: Mobile field report smoke (Playwright)
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pitbull
          POSTGRES_PASSWORD: pitbull_dev
          POSTGRES_DB: pitbull_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__PitbullDb: "Host=localhost;Port=5432;Database=pitbull_test;Username=pitbull;Password=pitbull_dev"
      Demo__Enabled: "true"
      Demo__SeedOnStartup: "true"
      API_BASE_URL: http://localhost:5081
      DEMO_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5081

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            e2e/package-lock.json
            src/Pitbull.Web/pitbull-web/package-lock.json

      - name: Build API
        run: dotnet build --configuration Release src/Pitbull.Api/Pitbull.Api.csproj

      - name: Install frontend dependencies
        working-directory: src/Pitbull.Web/pitbull-web
        run: npm ci

      - name: Build frontend
        working-directory: src/Pitbull.Web/pitbull-web
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5081
        run: npm run build

      - name: Install e2e dependencies + Playwright browsers
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start API (Development + demo seed)
        run: |
          dotnet run --project src/Pitbull.Api/Pitbull.Api.csproj \
            --configuration Release --no-build \
            --urls http://localhost:5081 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5081/health/live; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "::error::API failed to start"
          exit 1

      - name: Start frontend
        working-directory: src/Pitbull.Web/pitbull-web
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:5081
        run: |
          npm run start -- -p 3000 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Frontend failed to start"
          exit 1

      - name: Auth setup (role storage states)
        working-directory: e2e
        run: npx playwright test --project=setup-roles

      - name: Run mobile-field-report project
        working-directory: e2e
        run: npx playwright test --project=mobile-field-report

      - name: Upload mobile-smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: mobile-smoke-artifacts
          path: |
            e2e/recordings/**
            e2e/test-results/**
          if-no-files-found: ignore
