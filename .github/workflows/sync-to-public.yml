name: Sync to Public Repository

# Optional: push a scrubbed copy to jgarrison929/pitbull if you keep
# a private fork for internal notes. Not needed if this repo is public.
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Remove private content
        run: |
          rm -rf .private/
          rm -rf memory/ docs/sales/ docs/feedback/ planning/
          rm -f docs/EXECUTIVE-*.md docs/MARKETING-PLAN.md
          rm -f .github/workflows/sync-to-public.yml

      - name: Push to public repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          SSH_DEPLOY_KEY: ${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}
        with:
          source-directory: '.'
          destination-github-username: 'jgarrison929'
          destination-repository-name: 'pitbull'
          target-branch: main
          commit-message: 'Sync from private repository'