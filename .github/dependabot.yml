version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies"]
    commit-message:
      prefix: "deps"
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"

  - package-ecosystem: "npm"
    directory: "/src/Pitbull.Web/pitbull-web"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels: ["dependencies"]
    commit-message:
      prefix: "ci"