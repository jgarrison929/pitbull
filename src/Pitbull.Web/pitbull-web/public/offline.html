<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - Pitbull Construction Solutions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --fg: #0a0a0a;
      --muted: #737373;
      --border: #e5e5e5;
      --amber: #f59e0b;
      --amber-light: #fef3c7;
      --card-bg: #fafafa;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --fg: #fafafa;
        --muted: #a3a3a3;
        --border: #262626;
        --amber-light: #451a03;
        --card-bg: #171717;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--amber);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .icon {
      font-size: 48px;
      margin: 24px 0 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .pending-card {
      background: var(--amber-light);
      border: 1px solid var(--amber);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .pending-card .count {
      font-size: 28px;
      font-weight: 700;
      color: var(--amber);
    }

    .pending-card .label {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
      min-height: 48px;
      width: 100%;
      text-decoration: none;
    }

    .btn:active { opacity: 0.8; }

    .btn-primary {
      background: var(--amber);
      color: #fff;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .links {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .links a {
      color: var(--amber);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .links a:hover { text-decoration: underline; }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Pitbull</div>
    <div class="icon">&#x1F4F6;</div>
    <h1>You're Offline</h1>
    <p class="subtitle">
      No internet connection available. Your pending entries are safely stored
      on this device and will sync automatically when you reconnect.
    </p>

    <div class="pending-card" id="pending-card" style="display: none;">
      <div class="count" id="pending-count">0</div>
      <div class="label">pending entries saved locally</div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="location.reload()">
        &#x1F504; Retry Connection
      </button>
      <a href="/time-tracking/mobile" class="btn btn-outline">
        &#x23F1; Mobile Time Entry
      </a>
    </div>

    <div class="links">
      <a href="/">Go to Dashboard</a>
    </div>

    <p class="footer">Pitbull Construction Solutions</p>
  </div>

  <script>
    (function () {
      var DB_NAME = "pitbull-offline";
      var SYNC_QUEUE_STORE = "syncQueue";

      try {
        var request = indexedDB.open(DB_NAME);
        request.onsuccess = function () {
          var db = request.result;
          if (!db.objectStoreNames.contains(SYNC_QUEUE_STORE)) {
            db.close();
            return;
          }
          var tx = db.transaction(SYNC_QUEUE_STORE, "readonly");
          var store = tx.objectStore(SYNC_QUEUE_STORE);
          var countReq = store.count();
          countReq.onsuccess = function () {
            var count = countReq.result;
            if (count > 0) {
              document.getElementById("pending-count").textContent = count;
              document.getElementById("pending-card").style.display = "block";
            }
          };
          tx.oncomplete = function () { db.close(); };
        };
      } catch (e) {
        // IndexedDB not available
      }
    })();
  </script>
</body>
</html>
